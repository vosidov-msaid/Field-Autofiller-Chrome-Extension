<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Field Autofiller</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #17212f;
        --subtle: #546176;
        --accent: #1665d8;
        --accent-hover: #0f54b7;
        --border: #d7deea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(145deg, #f4f7fc 0%, #ebf1fb 100%);
        color: var(--text);
        min-width: 280px;
      }

      .container {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin: 10px;
        padding: 14px;
        box-shadow: 0 8px 24px rgba(20, 35, 66, 0.08);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 16px;
        text-align: center;
      }

      p {
        margin: 0 0 20px;
        color: var(--subtle);
        font-size: 12px;
        text-align: center;
      }

      .main-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }

      .main-buttons button {
        padding: 12px 16px;
        font-size: 14px;
      }

      button {
        border: none;
        border-radius: 8px;
        padding: 9px 10px;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        color: #fff;
      }

      button.primary:hover {
        background: var(--accent-hover);
      }

      button.secondary {
        background: #e9effa;
        color: #1f3f74;
      }

      button.secondary:hover {
        background: #d4e1f7;
      }

      #mainStatus {
        min-height: 16px;
        font-size: 12px;
        color: #1f6f2f;
        text-align: center;
      }

      #mainStatus.error {
        color: #9e2630;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Field Autofiller</h1>
      <p>Quickly autofill pages with your saved details.</p>
      <div class="main-buttons">
        <button id="quickFillBtn" class="primary" type="button">Fill</button>
        <button id="openSettingsBtn" class="secondary" type="button">Settings</button>
      </div>
      <div id="mainStatus" aria-live="polite"></div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
